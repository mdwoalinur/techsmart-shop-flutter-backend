spring.application.name=trademaster_ims

# Optional developer-only secrets. This file is Git-ignored; environment variables
# still take precedence in production and CI.
spring.config.import=optional:file:./application-local.properties

spring.datasource.url=${TRADEMASTER_DB_URL:jdbc:mysql://localhost:3306/trademaster}
spring.datasource.username=${TRADEMASTER_DB_USERNAME:root}
spring.datasource.password=${TRADEMASTER_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${TRADEMASTER_JPA_SHOW_SQL:false}

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.generate-ddl=true

# JWT Configuration
jwt.secret=${TRADEMASTER_JWT_SECRET}
jwt.expiration=${TRADEMASTER_JWT_EXPIRATION:86400000}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Central project-relative upload root
app.upload.root=uploads

# Optional trusted public origin used to expand customer-safe relative image URLs.
app.mobile.public-base-url=${TECHSMART_PUBLIC_BASE_URL:}

#another upload dir
file.upload-dir= testUploade 

# Application defaults
app.default-company-id=${TRADEMASTER_DEFAULT_COMPANY_ID:1}
app.default-admin.enabled=${TRADEMASTER_DEFAULT_ADMIN_ENABLED:false}
app.default-admin.username=${TRADEMASTER_DEFAULT_ADMIN_USERNAME:admin}
app.default-admin.password=${TRADEMASTER_DEFAULT_ADMIN_PASSWORD:}
app.default-admin.email=${TRADEMASTER_DEFAULT_ADMIN_EMAIL:admin@trademaster.com}
app.default-admin.phone=${TRADEMASTER_DEFAULT_ADMIN_PHONE:01795479789}

# Email / Gmail SMTP Configuration
spring.mail.host=${TRADEMASTER_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${TRADEMASTER_MAIL_PORT:587}
spring.mail.username=${TRADEMASTER_MAIL_USERNAME:}
spring.mail.password=${TRADEMASTER_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=${TRADEMASTER_MAIL_DEBUG:false}
logging.level.org.springframework.mail=${TRADEMASTER_MAIL_LOG_LEVEL:INFO}
logging.level.jakarta.mail=${TRADEMASTER_MAIL_LOG_LEVEL:INFO}
logging.level.com.sun.mail=${TRADEMASTER_MAIL_LOG_LEVEL:INFO}

app.email.enabled=${TRADEMASTER_EMAIL_ENABLED:true}
app.email.from=${TRADEMASTER_EMAIL_FROM:${spring.mail.username}}
app.email.company-name=${TRADEMASTER_EMAIL_COMPANY_NAME:TradeMaster}
app.email.company-phone=${TRADEMASTER_EMAIL_COMPANY_PHONE:}
app.email.company-address=${TRADEMASTER_EMAIL_COMPANY_ADDRESS:}
app.email.support-email=${TRADEMASTER_EMAIL_SUPPORT_EMAIL:${app.email.from}}
app.email.attach-pdf=${TRADEMASTER_EMAIL_ATTACH_PDF:false}

# TechSmart Shop customer authentication security settings
app.customer-auth.access-token-seconds=${TECHSMART_ACCESS_TOKEN_SECONDS:900}
app.customer-auth.refresh-token-days=${TECHSMART_REFRESH_TOKEN_DAYS:30}
app.customer-auth.otp-expiry-minutes=${TECHSMART_OTP_EXPIRY_MINUTES:10}
app.customer-auth.otp-max-attempts=${TECHSMART_OTP_MAX_ATTEMPTS:5}
app.customer-auth.otp-resend-cooldown-seconds=${TECHSMART_OTP_RESEND_COOLDOWN_SECONDS:45}
app.customer-auth.otp-max-resends=${TECHSMART_OTP_MAX_RESENDS:5}
app.customer-auth.reset-token-minutes=${TECHSMART_RESET_TOKEN_MINUTES:10}
app.customer-auth.max-login-failures=${TECHSMART_MAX_LOGIN_FAILURES:5}
app.customer-auth.lockout-minutes=${TECHSMART_LOCKOUT_MINUTES:15}

# TechSmart Shop order/return policy defaults
techsmart.orders.return-window-days=${TECHSMART_RETURN_WINDOW_DAYS:7}


